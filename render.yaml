services:
  - type: web
    name: arcade-hub
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: EMAIL_CONSOLE_FALLBACK
        value: "true"
      - key: SIGNUP_BONUS_COINS
        value: "500"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: CORS_ORIGINS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: arcade-hub-db
          property: connectionString

databases:
  - name: arcade-hub-db
    plan: free
